name: Docker Build Dockerfile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/docker-build-dockerfile.yaml@1.0.86
    permissions:
      contents: write
      packages: write
      checks: write
    with:
      dockerfile-squash: no
      qc-block-slash-containing-branches: true
      qc-block-conventional-commits: true
      hook-pre-tagging-tests-script-sub-path: bin/run-tests.bash
      hook-pre-docker-prepare-script-sub-path: bin/prepare-docker-context.bash
